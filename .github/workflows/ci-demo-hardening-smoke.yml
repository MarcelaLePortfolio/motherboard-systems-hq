name: ci-demo-hardening-smoke

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  demo-hardening-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show docker versions
        run: |
          set -euo pipefail
          docker version
          docker compose version

      - name: Precreate external docker network (motherboard_systems_hq_default)
        run: |
          set -euo pipefail
          docker network inspect motherboard_systems_hq_default >/dev/null 2>&1 || docker network create motherboard_systems_hq_default

      - name: Run demo hardening smoke (fresh boot → run_view → policy.probe.run)
        run: |
          set -euo pipefail
          export COMPOSE_PROJECT_NAME=motherboard_systems_hq_ci
          bash scripts/ci_demo_hardening_smoke.sh
