name: ci-phase57-snapshot

on:
  pull_request:
    branches: [ main ]

jobs:
  snapshot-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build + start stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.workers.yml up -d --build

      - name: Run Phase 57 snapshot smoke
        run: |
          bash scripts/phase57_snapshot_smoke.sh
