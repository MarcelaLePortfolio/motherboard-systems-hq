name: ci-phase57-snapshot

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  snapshot-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      COMPOSE_PROJECT_NAME: motherboard_systems_hq
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker version
        run: docker version

      - name: Compose version
        run: docker compose version

      - name: Clean slate
        run: |
          set -euo pipefail
          docker compose down --remove-orphans -v || true
          docker network rm "${COMPOSE_PROJECT_NAME}_default" 2>/dev/null || true

      - name: Bootstrap DB (run_view first)
        run: |
          set -euo pipefail
          bash scripts/phase57_ci_bootstrap.sh

      - name: Start stack
        run: |
          set -euo pipefail
          docker compose up -d --build

      - name: Wait for /api/health
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            code="$(curl -sS -o /tmp/health.json -w '%{http_code}' http://127.0.0.1:8080/api/health || true)"
            if [ "$code" = "200" ]; then
              cat /tmp/health.json || true
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: /api/health did not become ready" >&2
          exit 1

      - name: Run Phase 57 snapshot smoke
        run: |
          set -euo pipefail
          bash scripts/phase57_snapshot_smoke.sh

      - name: Dump logs on failure
        if: failure()
        run: |
          set -euo pipefail
          docker compose ps || true
          docker compose logs --no-color --timestamps | tail -n 400 || true

  # Compatibility status context alias for rulesets / branch requirements:
  # Some repos expect "ci-phase57-snapshot / snapshot-smoke" but Actions emits "ci-phase57-snapshot/snapshot-smoke".
  snapshot-smoke-status-context:
    name: snapshot-smoke-status-context
    runs-on: ubuntu-latest
    needs: [snapshot-smoke]
    if: ${{ always() }}
    permissions:
      statuses: write
      contents: read
    steps:
      - name: Post required status context alias (ci-phase57-snapshot / snapshot-smoke)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          RESULT: ${{ needs.snapshot-smoke.result }}
        run: |
          set -euo pipefail
          if [ "$RESULT" = "success" ]; then STATE="success"; else STATE="failure"; fi
          gh api -X POST -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/statuses/$SHA" \
            -f state="$STATE" \
            -f context="ci-phase57-snapshot / snapshot-smoke" \
            -f description="compat status context for ruleset-required check" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
