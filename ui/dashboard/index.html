<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Motherboard Dash</title>
  <style>
    body { margin: 0; font-family: 'Inter', sans-serif; background: #f9f9f9; color: #111; }
    .dashboard-wrapper { max-width: 960px; margin: 0 auto; padding: 40px 24px; display: flex; flex-direction: column; align-items: center; }
    h1 { font-size: 1.75rem; margin-bottom: 16px; }
    .section-title { font-weight: 600; font-size: 1rem; text-align: center; margin-bottom: 16px; }
    .agent-status { display: flex; gap: 24px; justify-content: center; margin-bottom: 16px; }
    .agent { font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .status-dot { display: inline-block; height: 12px; width: 12px; border-radius: 50%; background-color: gray; transition: background-color 0.3s; }
    .ops-stream { margin-bottom: 24px; font-size: 0.85rem; color: #555; overflow: hidden; text-align: center; }
    .chat-section { width: 100%; margin-bottom: 24px; }
    .messages { height: 200px; background: white; border: 1px solid #ccc; border-radius: 6px; padding: 12px; margin-bottom: 12px; overflow-y: auto; display: flex; flex-direction: column; }
    .message { padding: 8px 12px; border-radius: 6px; margin-bottom: 8px; max-width: 75%; line-height: 1.4; }
    .user-message { background-color: #e0f3ff; align-self: flex-end; }
    .bot-message { background-color: #f1f1f1; align-self: flex-start; }
    .input-row { display: flex; gap: 8px; }
    input[type="text"] { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    button { background-color: #3B82F6; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="dashboard-wrapper">
    <h1>Motherboard Dash</h1>
    <div class="section-title">Executive Agent Status</div>
    <div class="agent-status">
      <div class="agent">🧠 Matilda <span class="status-dot" id="matilda-indicator"></span></div>
      <div class="agent">🛠️ Cade <span class="status-dot" id="cade-indicator"></span></div>
      <div class="agent">🖥 Effie <span class="status-dot" id="effie-indicator"></span></div>
    </div>

    <div class="ops-stream">
      <div id="log">Initializing dashboard...</div>
    </div>

    <div class="chat-section">
      <div id="messages" class="messages"></div>
      <div class="input-row">
        <input type="text" id="input" placeholder="Type a command..." />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    console.log("✅ Dashboard JS executing (authentic polling)");

    async function fetchAgentStatus() {
      try {
        const res = await fetch("http://localhost:3081?" + Date.now());
        const data = await res.json();

        const statuses = {
          matilda: document.getElementById("matilda-indicator"),
          cade: document.getElementById("cade-indicator"),
          effie: document.getElementById("effie-indicator"),
        };

        for (const [agent, el] of Object.entries(statuses)) {
          const status = data[agent] || "offline";
          el.style.backgroundColor = status === "online" ? "green" : "red";
        }
      } catch (err) {
        console.error("❌ Failed to fetch agent status:", err);
      }
    }

    fetchAgentStatus();
    setInterval(fetchAgentStatus, 5000);

    function sendMessage() {
      const input = document.getElementById("input");
      const text = input.value.trim();
      if (!text) return;
      const messages = document.getElementById("messages");

      const userMsg = document.createElement("div");
      userMsg.className = "message user-message";
      userMsg.textContent = text;
      messages.appendChild(userMsg);

      const botMsg = document.createElement("div");
      botMsg.className = "message bot-message";
      botMsg.textContent = "Matilda received: “" + text + "”";
      messages.appendChild(botMsg);

      input.value = "";
      messages.scrollTop = messages.scrollHeight;
    }
  </script>
</body>
</html>
