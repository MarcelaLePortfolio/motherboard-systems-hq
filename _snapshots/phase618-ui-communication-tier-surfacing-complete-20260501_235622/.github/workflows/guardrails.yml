name: System Guardrails

on:
  pull_request:
  push:

jobs:
  validate-system-state:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check snapshot immutability
        run: |
          if git diff --name-only origin/main | grep -E "^snapshots/"; then
            echo "ERROR: Snapshot files cannot be modified."
            exit 1
          fi

      - name: Verify retry contract exists
        run: |
          test -f server/retry_contract.js

      - name: Verify worker retry enforcement exists
        run: |
          grep -q "enforceWorkerRetryContract" server/worker_retry_enforcer.js

      - name: Verify retry routing exists
        run: |
          grep -q "routeRetryExecution" server/retry_execution_router.js

      - name: Validate server syntax
        run: |
          node --check server.mjs

      - name: Validate retry contract wiring
        run: |
          grep -R "routeRetryExecution" server.mjs || true
          grep -R "enforceWorkerRetryContract" server || true
