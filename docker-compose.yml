# removed entrypoint override causing runtime crash
# NOTE: this file is intentionally sanitized to avoid /usr/local/bin/docker-entrypoint-guard.sh dependency

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    command: ["node", "server.cjs"]
    depends_on:
      - postgres

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "server.cjs"]
    depends_on:
      - postgres

volumes:
  pgdata:
