services:
  worker:
    image: motherboard_systems_hq-dashboard
    container_name: motherboard_systems_hq-worker-1
    command: ["node", "server/worker/phase26_task_worker.mjs"]
    depends_on:
      - postgres
    environment:
      - NODE_ENV=development
      - POSTGRES_URL=postgres://postgres:postgres@postgres:5432/postgres
      - PHASE34_ENABLE_LEASE=1
      - PHASE27_CLAIM_ONE_SQL=server/worker/phase35_claim_one_pg.sql
      - PHASE27_MARK_SUCCESS_SQL=server/worker/phase35_mark_success_pg.sql
      - PHASE27_MARK_FAILURE_SQL=server/worker/phase35_mark_failure_pg.sql
    restart: unless-stopped
